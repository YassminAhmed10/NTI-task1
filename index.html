<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Appointment Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="parent">

    <div class="item left">

        <form action="" method="GET">

            <h1>Doctor Appointment Form</h1>

            
            <div class="field">
                <label>Appointment Date</label>
                <input type="date" name="date">
            </div>

            
            <div class="field">
                <label>Appointment Time</label>
                <input type="time" name="time">
            </div>

            <div class="row">
                <div class="field">
                    <label>First Name</label>
                    <input type="text" name="firstName">
                </div>

                <div class="field">
                    <label>Last Name</label>
                    <input type="text" name="lastName">
                </div>
            </div>

            
            <div class="field">
                <label>Gender</label>

                <div class="gender">
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            
            <div class="field">
                <label>Phone</label>
                <input type="text" name="phone">
            </div>

            
            <div class="row">
                <div class="field">
                    <label>City</label>
                    <input type="text" name="city">
                </div>

                <div class="field">
                    <label>State</label>
                    <input type="text" name="state">
                </div>
            </div>

            
            <div class="field">
                <label>Appointment Type</label>
                <p class="hint">Select which appointment type(s) you require</p>

                <div class="checkbox-group">

                    <label class="check-item">
                        <input type="checkbox" name="type" value="cervix">
                        Cervix checkup
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="type" value="heart">
                        Heart checkup
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="type" value="eye">
                        Eye check-up
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="type" value="hearing">
                        Hearing Test
                    </label>

                </div>
            </div>

            
            <div class="field">
                <label>Your Query</label>
                <textarea name="query"></textarea>
            </div>

            
            <button type="submit">Send</button>

        </form>

    </div>

    
    <div class="item right">
        <img src="Images/task1image2.png" alt="doctor">
    </div>

</div>

</body>
</html>
